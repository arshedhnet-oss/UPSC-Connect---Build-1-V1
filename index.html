<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ SEO Optimized Title -->
    <title>UPSC Connect - Comprehensive UPSC Preparation Platform</title>

    <!-- ✅ SEO Meta Description -->
    <meta
      name="description"
      content="Get personalized UPSC mentorship from toppers and experienced mentors. Book 1-on-1 guidance for Prelims, Mains, and Interview preparation."
    />

    <meta name="author" content="UPSC Connect" />

    <!-- ✅ Open Graph (for Google + WhatsApp sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UPSC Connect" />
    <meta property="og:title" content="UPSC Connect - UPSC Mentorship by Toppers | 1-on-1 UPSC Guidance" />
    <meta
      property="og:description"
      content="Connect with UPSC toppers and experienced mentors for personalized guidance. Book 1-on-1 mentorship for Prelims, Mains, and Interview."
    />
    <meta property="og:url" content="https://www.upscconnect.in/" />

    <!-- ✅ Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@UPSCConnect" />
    <meta name="twitter:domain" content="upscconnect.in" />
    <meta name="twitter:title" content="UPSC Connect - UPSC Mentorship by Toppers | Book 1-on-1 Guidance" />
    <meta
      name="twitter:description"
      content="Personalized UPSC mentorship from toppers. Crack Prelims, Mains & Interview with expert guidance."
    />

    <!-- ✅ Favicon Fix (force refresh) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=5" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=5" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=5" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=5" />
    <link rel="manifest" href="/site.webmanifest?v=5" />

    <!-- ✅ Canonical URL (important for SEO) -->
    <link rel="canonical" href="https://www.upscconnect.in/" />

    <!-- ✅ WebSite + Organization JSON-LD (controls Google Search display name) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://www.upscconnect.in/#website",
            "name": "UPSC Connect",
            "alternateName": "UPSC Connect - Mentorship by Toppers",
            "url": "https://www.upscconnect.in/",
            "publisher": { "@id": "https://www.upscconnect.in/#organization" }
          },
          {
            "@type": "Organization",
            "@id": "https://www.upscconnect.in/#organization",
            "name": "UPSC Connect",
            "url": "https://www.upscconnect.in/",
            "email": "admin@upscconnect.in"
          }
        ]
      }
    </script>

    <!-- Preconnect to font origins to speed up FCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Async-load Google Fonts to avoid render-blocking (improves FCP) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      />
    </noscript>

    <!-- Razorpay checkout.js is lazy-loaded on demand from src/lib/loadRazorpay.ts to improve FCP -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
